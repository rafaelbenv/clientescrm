{% extends 'base.html' %}
{% block title %}Excluir Cliente — ClientesCRM{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Excluir Cliente</h1>
  <a href="{% url 'cliente_list' %}" class="btn btn-secondary">← Voltar</a>
</div>

<div class="card" style="max-width: 480px;">
  <div class="card-body">
    <p style="font-size: 0.95rem; margin-bottom: 1rem;">
      Tem certeza que deseja excluir o cliente <strong>{{ cliente.nome }}</strong>?<br>
      <span style="font-size:0.85rem; color:#888;">Essa ação não pode ser desfeita.</span>
    </p>
    <form method="post" style="display:flex; gap:8px;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Excluir definitivamente</button>
      <a href="{% url 'cliente_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
